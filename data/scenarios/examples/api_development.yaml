name: "API Development"
description: "Plan and develop RESTful APIs with best practices"

planner_prompt_template: |
  You are a senior API architect. Analyze the API development request:

  User Request: {user_intent}

  Additional Context:
  - Endpoints: {endpoints}
  - Authentication: {authentication}
  - Database: {database}

  Create a comprehensive plan for:
  1. API design and endpoint structure
  2. Authentication and authorization
  3. Data validation and error handling
  4. Documentation strategy
  5. Testing approach

executor_template: |
  Task: {task}

  API Context:
  - Endpoints: {endpoints}
  - Authentication: {authentication}
  - Database: {database}
  - Framework: {framework}

  Implement this task following REST best practices:
  - Use appropriate HTTP methods (GET, POST, PUT, DELETE)
  - Implement proper status codes
  - Add request validation
  - Include error handling
  - Document with OpenAPI/Swagger

input_schema:
  fields:
    - name: endpoints
      type: array
      description: List of required endpoints and their purposes
      required: true
    - name: authentication
      type: string
      description: Authentication method (JWT, OAuth, API Key)
      required: false
      default: "JWT"
    - name: database
      type: string
      description: Database type (PostgreSQL, MongoDB, etc.)
      required: false
      default: "PostgreSQL"
    - name: framework
      type: string
      description: Framework to use (FastAPI, Express, etc.)
      required: false
      default: "FastAPI"

output_schema:
  type: object
  fields:
    - name: api_code
      type: string
      description: Implementation code for the API
    - name: openapi_spec
      type: object
      description: OpenAPI/Swagger specification
    - name: test_cases
      type: array
      description: Test cases for the API
    - name: documentation
      type: string
      description: API documentation
