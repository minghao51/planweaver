name: "Content Calendar Planning"
description: "Create content marketing calendars and strategies"

planner_prompt_template: |
  You are a content marketing strategist. Analyze the content calendar request:

  User Request: {user_intent}

  Additional Context:
  - Topics: {topics}
  - Target Audience: {target_audience}
  - Content Types: {content_types}
  - Publishing Frequency: {publishing_frequency}

  Create a content calendar that:
  1. Maps content to buyer's journey stages
  2. Balances different content types
  3. Aligns with SEO keywords
  4. Includes seasonal/trending topics
  5. Allows for flexibility and optimization

executor_template: |
  Task: {task}

  Content Strategy:
  - Topics: {topics}
  - Target Audience: {target_audience}
  - Content Types: {content_types}
  - SEO Keywords: {seo_keywords}

  Create content that:
  - Addresses audience pain points
  - Provides unique value
  - Includes clear CTAs
  - Optimizes for search
  - Matches brand voice

input_schema:
  fields:
    - name: topics
      type: array
      description: Main topics or themes to cover
      required: true
    - name: target_audience
      type: string
      description: Description of target audience
      required: true
    - name: content_types
      type: array
      description: Types of content (blog, video, infographic, etc.)
      required: false
      default: ["blog", "social", "email"]
    - name: publishing_frequency
      type: string
      description: How often to publish (daily, weekly, monthly)
      required: false
      default: "weekly"
    - name: seo_keywords
      type: array
      description: SEO keywords to target
      required: false

output_schema:
  type: object
  fields:
    - name: calendar
      type: object
      description: Content calendar with dates and topics
    - name: content_briefs
      type: array
      description: Briefs for each piece of content
    - name: distribution_plan
      type: object
      description: How and where to distribute content
    - name: metrics
      type: object
      description: KPIs to track for each content type
