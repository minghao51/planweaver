name: "Research Summary"
description: "Synthesize research findings into comprehensive summaries"

planner_prompt_template: |
  You are a research analyst. Analyze the research summary request:

  User Request: {user_intent}

  Additional Context:
  - Research Topic: {research_topic}
  - Sources: {sources}
  - Focus Areas: {focus_areas}
  - Target Audience: {target_audience}

  Create a plan to:
  1. Extract key findings from sources
  2. Identify patterns and themes
  3. Synthesize conflicting information
  4. Highlight knowledge gaps
  5. Present actionable insights

executor_template: |
  Task: {task}

  Research Context:
  - Topic: {research_topic}
  - Focus Areas: {focus_areas}
  - Target Audience: {target_audience}

  Synthesize research that:
  - Accurately represents source material
  - Identifies consensus and disagreement
  - Provides proper citations
  - Distills complex information
  - Offers practical implications

input_schema:
  fields:
    - name: research_topic
      type: string
      description: The main research question or topic
      required: true
    - name: sources
      type: array
      description: List of research sources or papers
      required: true
    - name: focus_areas
      type: array
      description: Specific aspects to focus on
      required: false
    - name: target_audience
      type: string
      description: Who will read this summary (technical, executive, general)
      required: false
      default: "technical"

output_schema:
  type: object
  fields:
    - name: executive_summary
      type: string
      description: High-level overview of findings
    - name: key_findings
      type: array
      description: Main findings organized by theme
    - name: methodology_review
      type: string
      description: Assessment of research methods used
    - name: knowledge_gaps
      type: array
      description: Areas needing further research
    - name: recommendations
      type: array
      description: Actionable recommendations based on findings
    - name: references
      type: array
      description: Properly formatted citations
